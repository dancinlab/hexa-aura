# hexa.toml — hexa-aura standalone package manifest
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Distribution target: hx install hexa-aura
# Provenance: bundled from canon/domains/{life,cognitive,compute}/ on 2026-05-10
#             (sister of hexa-mobility / hexa-matter / hexa-grid).
#
# v0.1.0 ships as a thin BUNDLE. 5 of 11 docs are intentionally extracted
# from older canon SHAs to recover richer Korean content lost in a 2025
# canonical-format migration (see TODO.md). The remaining 6 are current
# canon copies.
#
# Concept: 측두골 클립 — a behind-the-ear chip that replaces the smartphone
# (and 18 other wearables) by directly interfacing the temporal-bone-
# adjacent cortices via RT-SC nano-coils. n=6 BCI substrate.

[package]
name = "hexa-aura"
version = "0.1.0"
entry = "cli/hexa-aura.hexa"
description = "n=6 post-aural BCI substrate (HEXA family) — 측두골 클립이 스마트폰+18개 웨어러블 대체. neuro · BCI · neuromorphic · mind/speak/dream/telepathy 11-doc bundle."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/dancinlab/hexa-aura"
homepage = "https://github.com/dancinlab/hexa-aura"
readme = "README.md"
keywords = ["bci", "neuro", "post-aural", "mastoid", "wearable-replacement", "neuromorphic", "telepathy", "subvocal", "hexa-family"]
categories = ["bci", "wearable", "spec-substrate"]

[[bin]]
name = "hexa-aura"
path = "cli/hexa-aura.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_selftest.hexa",
]

[scripts]
install = "install.hexa"

# ── Verb manifest (11-doc bundle at v0.1.0) ───────────────
verb_parent = "docs"
[verbs]
neuro                     = ["neuro"]
hexa_neuro                = ["hexa-neuro"]
brain_computer_interface  = ["brain-computer-interface"]
hexa_ear                  = ["hexa-ear"]
hexa_neuromorphic         = ["hexa-neuromorphic"]
l9_field_photon_neuro     = ["l9-field-photon-neuro"]
hexa_mind                 = ["hexa-mind"]
hexa_speak                = ["hexa-speak"]
hexa_dream                = ["hexa-dream"]
hexa_telepathy            = ["hexa-telepathy"]
neuroscience              = ["neuroscience"]

# ── Cross-link (sister substrates — invoke their CLIs directly) ──
# Policy:
#   - perception ML serving / decoder models   → hexa-codex CLI
#   - skin-electrode chemistry / membrane      → hexa-skin (via canon → future)
#   - chip-grade neuromorphic silicon          → hexa-chip CLI
#   - V2X / 5G/6G uplink                       → hexa-grid CLI
[crosslink]
codex = "dancinlab/hexa-codex (decoder model serving)"
chip  = "dancinlab/hexa-chip (neuromorphic silicon — call `hexa-chip neuromorphic` directly)"
grid  = "dancinlab/hexa-grid (5G/6G uplink for cloud sync)"

# ── Closure provenance (raw#10 honest C3) ─────────────────
[closure]
verbs_total = 11
groups_total = 11
verbs_wired = 0
verbs_spec = 11
verdict = "BUNDLE_FIRST"
extracted_from = "canon/domains/{life,cognitive,compute}/ @ aadcb101 + historical SHAs (5 docs)"

# ── Scope honesty (raw#10 C3) ─────────────────────────────
[scope]
honest_scope = "11-doc bundle. 5 docs (neuro / brain-computer-interface / hexa-ear / hexa-speak / hexa-dream) are intentionally extracted from older canon SHAs (579ab196, ab155706) to recover richer Korean content lost in a canonical-format migration. 6 docs are current canon. v0.1.0 ships as BUNDLE_FIRST; full n=6 HEXA-template integration is TODO."
not_scope = ["decoder model serving (→ hexa-codex CLI)", "neuromorphic silicon (→ hexa-chip CLI)", "5G/6G uplink (→ hexa-grid CLI)", "in-vivo validation", "regulatory clearance"]

# ── Cost profile ──────────────────────────────────────────
[cost]
mac_local_default = "$0 (spec read + CLI dispatcher)"
selftest = "$0 (verb count check)"
